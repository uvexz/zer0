services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: zer0
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./.localdata/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./.localdata/redis:/data
